<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFerret Linux 3 — Release Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--nf-orange:#ff6a00;
--nf-amber:#ffb347;
--nf-dark:#0a0a0a;
--nf-surface:#111111;
--nf-card:#161616;
--nf-border:#2a2a2a;
--nf-text:#e8e0d0;
--nf-muted:#6b6560;
--nf-accent:#ff6a00;
}

html,body{
  height:100%;
  background:var(--nf-dark);
  color:var(--nf-text);
  font-family:'Rajdhani',sans-serif;
  overflow-x:hidden;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  position:relative;
}

.bg-grid{
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(255,106,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,106,0,0.03) 1px, transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
  z-index:0;
}

.bg-glow{
  position:fixed;
  width:600px;
  height:600px;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,106,0,0.07) 0%, transparent 70%);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  pointer-events:none;
  z-index:0;
  animation:pulse 4s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.6;transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}
}

.wrapper{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0;
  width:100%;
  max-width:900px;
  padding:2rem 1.5rem;
}

.eyebrow{
  font-family:'Share Tech Mono',monospace;
  font-size:0.75rem;
  letter-spacing:0.25em;
  color:var(--nf-orange);
  text-transform:uppercase;
  margin-bottom:0.75rem;
  animation:fadeDown 0.8s ease both;
}

.title{
  font-family:'Bebas Neue',Impact,sans-serif;
  font-size:clamp(3.5rem,10vw,7rem);
  letter-spacing:0.04em;
  line-height:0.9;
  text-align:center;
  color:#fff;
  animation:fadeDown 0.9s 0.1s ease both;
}

.title span{
  color:var(--nf-orange);
}

.subtitle{
  font-family:'Rajdhani',sans-serif;
  font-size:1.1rem;
  letter-spacing:0.15em;
  color:var(--nf-muted);
  text-transform:uppercase;
  margin-top:0.5rem;
  margin-bottom:2.5rem;
  animation:fadeDown 1s 0.2s ease both;
}

.divider{
  width:100%;
  height:1px;
  background:linear-gradient(90deg, transparent, var(--nf-orange), transparent);
  margin-bottom:2.5rem;
  animation:fadeIn 1.2s 0.3s ease both;
  opacity:0;
}

.countdown-row{
  display:flex;
  align-items:flex-start;
  justify-content:center;
  gap:0;
  width:100%;
  animation:fadeUp 1s 0.4s ease both;
  opacity:0;
}

.unit{
  display:flex;
  flex-direction:column;
  align-items:center;
  flex:1;
  max-width:220px;
}

.unit-sep{
  font-family:'Bebas Neue',Impact,sans-serif;
  font-size:clamp(4rem,12vw,8rem);
  color:var(--nf-orange);
  line-height:1;
  padding:0 0.1em;
  margin-top:0.05em;
  opacity:0.4;
  align-self:flex-start;
}

.digit-box{
  position:relative;
  width:100%;
  background:var(--nf-card);
  border:1px solid var(--nf-border);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0.2em 0.1em;
}

.digit-box::before{
  content:'';
  position:absolute;
  inset:0;
  border-top:2px solid var(--nf-orange);
  opacity:0.6;
}

.digit{
  font-family:'Bebas Neue',Impact,sans-serif;
  font-size:clamp(5rem,14vw,9rem);
  color:#fff;
  line-height:1;
  letter-spacing:0.02em;
  transition:transform 0.08s ease;
}

.digit.tick{
  transform:scaleY(0.94);
}

.label{
  font-family:'Share Tech Mono',monospace;
  font-size:0.65rem;
  letter-spacing:0.3em;
  color:var(--nf-muted);
  text-transform:uppercase;
  margin-top:0.6rem;
}

.status-bar{
  margin-top:3rem;
  width:100%;
  background:var(--nf-surface);
  border:1px solid var(--nf-border);
  border-left:3px solid var(--nf-orange);
  padding:1rem 1.5rem;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:0.75rem;
  animation:fadeUp 1s 0.6s ease both;
  opacity:0;
}

.status-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--nf-orange);
  flex-shrink:0;
  animation:blink 1.4s ease-in-out infinite;
}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:0.2}
}

.status-text{
  font-family:'Share Tech Mono',monospace;
  font-size:0.8rem;
  letter-spacing:0.08em;
  color:var(--nf-muted);
  text-transform:uppercase;
}

.status-text strong{
  color:var(--nf-amber);
  font-weight:normal;
}

.tz-info{
  margin-top:1.25rem;
  font-family:'Share Tech Mono',monospace;
  font-size:0.7rem;
  letter-spacing:0.15em;
  color:var(--nf-muted);
  text-align:center;
  animation:fadeIn 1.2s 0.8s ease both;
  opacity:0;
}

.expired-msg{
  font-family:'Bebas Neue',Impact,sans-serif;
  font-size:clamp(2rem,6vw,4rem);
  color:var(--nf-orange);
  text-align:center;
  letter-spacing:0.05em;
  display:none;
}

@keyframes fadeDown{
  from{opacity:0;transform:translateY(-18px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@media(max-width:600px){
  .unit-sep{font-size:3rem;margin-top:0.15em}
  .digit{font-size:4.5rem}
  .status-bar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">
  <p class="eyebrow">🐾 &nbsp; upcoming release</p>
  <h1 class="title">NextFerret<br><span>Linux 3</span></h1>
  <p class="subtitle">Release Countdown</p>
  <div class="divider"></div>

  <div class="countdown-row" id="countdown-row">
    <div class="unit">
      <div class="digit-box"><span class="digit" id="d-h">00</span></div>
      <p class="label">Hours</p>
    </div>
    <div class="unit-sep">:</div>
    <div class="unit">
      <div class="digit-box"><span class="digit" id="d-m">00</span></div>
      <p class="label">Minutes</p>
    </div>
    <div class="unit-sep">:</div>
    <div class="unit">
      <div class="digit-box"><span class="digit" id="d-s">00</span></div>
      <p class="label">Seconds</p>
    </div>
  </div>

  <p class="expired-msg" id="expired-msg">🐾 NextFerret Linux 3 is Live!</p>

  <div class="status-bar">
    <div class="status-dot"></div>
    <p class="status-text">Status &nbsp;— &nbsp;Tests will start at &nbsp;<strong id="test-time"></strong></p>
  </div>

  <p class="tz-info" id="tz-info">Detecting your timezone…</p>
</div>

<script>
(function(){
  var TARGET_UTC = Date.UTC(2026,4,18,21,0,0);
  var TEST_UTC   = Date.UTC(2026,4,18,19,30,0);

  var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  var tzInfo = document.getElementById('tz-info');
  tzInfo.textContent = 'Your timezone: ' + tz;

  var testEl = document.getElementById('test-time');
  var testDate = new Date(TEST_UTC);
  var testFormatted = testDate.toLocaleTimeString([], {
    hour:'2-digit',
    minute:'2-digit',
    timeZoneName:'short'
  });
  testEl.textContent = testFormatted + ' — ' + testDate.toLocaleDateString([], {month:'short',day:'numeric',year:'numeric'});

  var dH = document.getElementById('d-h');
  var dM = document.getElementById('d-m');
  var dS = document.getElementById('d-s');
  var expMsg = document.getElementById('expired-msg');
  var cdRow = document.getElementById('countdown-row');

  function pad(n){ return n < 10 ? '0'+n : ''+n; }

  function tick(){
    var now = Date.now();
    var diff = TARGET_UTC - now;

    if(diff <= 0){
      cdRow.style.display = 'none';
      expMsg.style.display = 'block';
      return;
    }

    var totalSec = Math.floor(diff / 1000);
    var s = totalSec % 60;
    var totalMin = Math.floor(totalSec / 60);
    var m = totalMin % 60;
    var h = Math.floor(totalMin / 60);

    var newH = pad(h);
    var newM = pad(m);
    var newS = pad(s);

    function updateDigit(el, val){
      if(el.textContent !== val){
        el.textContent = val;
        el.classList.remove('tick');
        void el.offsetWidth;
        el.classList.add('tick');
        setTimeout(function(){ el.classList.remove('tick'); }, 100);
      }
    }

    updateDigit(dH, newH);
    updateDigit(dM, newM);
    updateDigit(dS, newS);
  }

  tick();
  setInterval(tick, 1000);
})();
</script>
</body>
</html>
